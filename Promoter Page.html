/* ──────────────────────────────────────────────────────────────────
   MSC Design System — Colors & Type tokens
   Medicare Supply Chain · Cheaper. Faster… Better.
   ────────────────────────────────────────────────────────────────── */

/* Fonts — load via <link> tag in HTML; these match the Figma source.
   Inter (UI) and Lato (display/marketing) are the primary stacks.
   Google Fonts CDN:
     https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lato:wght@400;500;700;900&display=swap
*/

:root {
  /* ─── Brand / Primary teal ───────────────────────────────────── */
  --msc-primary-50:  #E6FFFA;   /* very pale teal — alert backgrounds   */
  --msc-primary-100: #C6FFF3;
  --msc-primary-200: #97FBE7;
  --msc-primary-300: #63ECD4;   /* alert borders                         */
  --msc-primary-400: #32D4BE;
  --msc-primary-500: #00AE99;   /* PRIMARY brand teal — buttons, links   */
  --msc-primary-600: #008B7D;   /* hover                                 */
  --msc-primary-700: #066B63;   /* pressed                               */
  --msc-primary-800: #064E48;
  --msc-primary-900: #043A36;
  --msc-primary-950: #012423;

  /* ─── Neutrals (light mode) ─────────────────────────────────── */
  --msc-white:       #FFFFFF;
  --msc-neutral-50:  #FDFDFD;
  --msc-neutral-100: #F5F5F5;   /* page backgrounds                      */
  --msc-neutral-200: #E8E8E8;   /* dividers                              */
  --msc-neutral-300: #9F9F9F;   /* placeholder text                      */
  --msc-neutral-400: #555555;   /* secondary text                        */
  --msc-neutral-500: #222222;   /* body text                             */
  --msc-neutral-600: #121212;
  --msc-neutral-700: #080808;
  --msc-neutral-800: #050505;
  --msc-neutral-900: #000000;

  /* ─── Neutrals (dark mode) ──────────────────────────────────── */
  --msc-dark-bg:     #000000;
  --msc-dark-surface:#181818;
  --msc-dark-elev:   #2A2A2A;
  --msc-dark-muted:  #7A7A7A;
  --msc-dark-text:   #F1F1F1;

  /* ─── Untitled-UI-style slate scale (used in Figma docs UI) ─── */

  --msc-slate-50:    #F2F4F7;
  --msc-slate-100:   #EAECF0;
  --msc-slate-200:   #E2E8F0;
  --msc-slate-300:   #D0D5DD;
  --msc-slate-400:   #98A2B3;
  --msc-slate-500:   #667085;   /* supporting text                       */
  --msc-slate-600:   #475569;   /* body text in docs                     */
  --msc-slate-700:   #344054;
  --msc-slate-800:   #1D1F23;   /* docs heading                          */
  --msc-slate-900:   #101828;

  /* ─── Semantic ─────────────────────────────────────────────── */
  --msc-success-50:  #F6FEF9;
  --msc-success-100: #D1FADF;
  --msc-success-500: #0ABE52;   /* badge teal-green                      */
  --msc-success-600: #008B7D;
  --msc-success-700: #066B63;

  --msc-warning-50:  #FFFAF5;
  --msc-warning-100: #FFF1BF;
  --msc-warning-500: #FDC12D;   /* alert yellow                          */
  --msc-warning-600: #E9A500;
  --msc-warning-700: #C27F00;

  --msc-error-50:    #FEF9F9;
  --msc-error-100:   #FEE4E2;
  --msc-error-200:   #FECDCA;   /* error border                          */
  --msc-error-500:   #E92222;   /* error red                             */
  --msc-error-600:   #C51616;
  --msc-error-700:   #A00F0F;

  --msc-info-50:     #EFF8FF;
  --msc-info-500:    #2E90FA;

  --msc-space-6:   24px;

  --msc-radius-lg:   12px;    /* large surfaces                         */

/* ──────────────────────────────────────────────────────────────────
   Semantic typography classes
   ────────────────────────────────────────────────────────────────── */
.msc-display-2xl,
.msc-display-xl,
.msc-display-lg,
.msc-display-md,
.msc-display-sm {
  font-family: var(--msc-font-display);
  font-weight: 800;
  color: var(--msc-fg);
  letter-spacing: var(--msc-tracking-tight);
  text-wrap: balance;
}
.msc-display-2xl { font: 800 87px/88px var(--msc-font-display); letter-spacing: -0.02em; }
.msc-display-xl  { font: 800 60px/72px var(--msc-font-display); letter-spacing: -0.02em; }
.msc-display-lg  { font: 700 48px/56px var(--msc-font-display); letter-spacing: -0.024em; }
.msc-display-md  { font: 700 40px/48px var(--msc-font-ui);      letter-spacing: -0.028em; }
.msc-display-sm  { font: 700 32px/40px var(--msc-font-ui);      letter-spacing: -0.024em; }

.msc-h1 { font: 700 30px/38px var(--msc-font-ui); color: var(--msc-fg); letter-spacing: -0.018em; }
.msc-h2 { font: 600 24px/32px var(--msc-font-ui); color: var(--msc-fg); letter-spacing: -0.014em; }
.msc-h3 { font: 600 20px/30px var(--msc-font-ui); color: var(--msc-fg); }

.msc-eyebrow {
  font: 600 12px/16px var(--msc-font-ui);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--msc-primary-500);
}

.msc-body-xl { font: 400 20px/30px var(--msc-font-ui); color: var(--msc-slate-500); }
.msc-body-lg { font: 400 18px/28px var(--msc-font-ui); color: var(--msc-slate-600); }

.msc-body-sm { font: 400 14px/20px var(--msc-font-ui); color: var(--msc-fg-1); }
.msc-caption { font: 400 12px/16px var(--msc-font-ui); color: var(--msc-fg-2); }

.msc-label    { font: 500 14px/20px var(--msc-font-ui); color: var(--msc-slate-700); }
.msc-btn-text { font: 500 14px/20px var(--msc-font-ui); }

.msc-tagline { /* "Cheaper. Faster... Better." */
  font-family: var(--msc-font-tagline);
  font-weight: 400;
  color: var(--msc-primary-500);
  letter-spacing: 0.01em;
}

.msc-mono { font-family: var(--msc-font-mono); font-size: 13px; line-height: 20px; }


/* ── Page reset ─────────────────────────────────────────────── */
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: "Inter", system-ui, sans-serif;
  color: #141B34;
  background: #F5F5F5;

}
*, *::before, *::after { box-sizing: border-box; }
[data-lucide] { stroke-width: 2; vertical-align: middle; }
button { font-family: inherit; }
input, select, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }
.dc-card *::-webkit-scrollbar { display: none; }
.dc-card * { scrollbar-width: none; }

<script type="text/babel">

// The MSC Figma source uses HugeIcons (linear) + a small set of vuesax/linear glyphs.

// 2-stroke aesthetic.

// stubs into real SVGs. This is idempotent.

  dashboardSpeed02:  'layout-dashboard',

<!-- ── 4 · Promoter shared components (QR, StatusPill, etc.) ── -->
<script type="text/babel">
// PromoterShared.jsx — building blocks reused by all three Promoter variants.
// Status pills · QR code SVG · Invitee table · Commission table · Withdrawal list.

// ─── deterministic pseudo-random for QR rendering ─────────────────────
function hashSeed(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function rng(seed) {
  let s = seed >>> 0;
  return () => {
    s ^= s << 13; s >>>= 0;
    s ^= s >> 17;
    s ^= s << 5;  s >>>= 0;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// ─── QR-style mark (stylised; placeholder for a real QR encoder) ──────
function QRSvg({ code = 'MSC-CVS-7K2P', size = 220, fg = '#141B34', bg = '#fff', radius = 12, brand = true }) {
  const N = 29;
  const cell = (size - 20) / N;
  const off = 10;
  const r = rng(hashSeed(code));
  const modules = [];
  // Finder patterns in 3 corners (7x7 outer with 3x3 inner)
  const finder = (cx, cy) => {
    // outer ring
    for (let y = 0; y < 7; y++) {
      for (let x = 0; x < 7; x++) {
        const onBorder = x === 0 || x === 6 || y === 0 || y === 6;
        const inner = x >= 2 && x <= 4 && y >= 2 && y <= 4;
        if (onBorder || inner) modules.push([cx + x, cy + y]);
      }
    }
  };
  finder(0, 0); finder(N - 7, 0); finder(0, N - 7);
  // Alignment pattern bottom-right (5x5)
  const align = (cx, cy) => {
    for (let y = 0; y < 5; y++) {
      for (let x = 0; x < 5; x++) {
        const onBorder = x === 0 || x === 4 || y === 0 || y === 4;
        const center = x === 2 && y === 2;
        if (onBorder || center) modules.push([cx + x, cy + y]);
      }
    }
  };
  align(N - 9, N - 9);
  // Timing patterns
  for (let i = 8; i < N - 8; i++) {
    if (i % 2 === 0) { modules.push([i, 6]); modules.push([6, i]); }
  }
  // Filler modules (random)
  const reserved = (x, y) => (
    (x < 8 && y < 8) ||
    (x >= N - 8 && y < 8) ||
    (x < 8 && y >= N - 8) ||
    (x >= N - 9 && x < N - 4 && y >= N - 9 && y < N - 4) ||
    x === 6 || y === 6
  );
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      if (reserved(x, y)) continue;
      if (r() < 0.48) modules.push([x, y]);
    }
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block', borderRadius: radius, background: bg }}>
      <rect x={0} y={0} width={size} height={size} rx={radius} fill={bg} />
      {modules.map(([x, y], i) => (
        <rect
          key={i}
          x={off + x * cell + 0.5}
          y={off + y * cell + 0.5}
          width={cell - 1}
          height={cell - 1}
          rx={cell * 0.18}
          fill={fg}
        />
      ))}
      {brand && (
        <g>
          <rect
            x={size / 2 - cell * 3.2}
            y={size / 2 - cell * 3.2}
            width={cell * 6.4}
            height={cell * 6.4}
            rx={8}
            fill={bg}
          />
          <rect
            x={size / 2 - cell * 2.4}
            y={size / 2 - cell * 2.4}
            width={cell * 4.8}
            height={cell * 4.8}
            rx={6}
            fill="#00AE99"
          />
          <text
            x={size / 2}
            y={size / 2 + cell * 0.9}
            fill="#fff"
            fontFamily="Lato, sans-serif"
            fontWeight={900}
            fontSize={cell * 3}
            textAnchor="middle"
          >M</text>
        </g>
      )}
    </svg>
  );
}

// ─── Status pill ──────────────────────────────────────────────────────
const STATUS_META = {
  pending:      { label: 'Pending Payment',  tone: 'warning', dot: '#FDC12D', icon: 'clock' },
  withdrawable: { label: 'Withdrawable',     tone: 'success', dot: '#0ABE52', icon: 'download' },
  withdrawn:    { label: 'Payment Withdrawn',tone: 'neutral', dot: '#667085', icon: 'checkCircle' },
  verified:     { label: 'Verified',         tone: 'success', dot: '#0ABE52', icon: 'checkCircle' },
};
function StatusPill({ status, size = 'sm' }) {
  const meta = STATUS_META[status] || { label: status, tone: 'neutral', dot: '#9F9F9F' };
  const palette = {
    success: { bg: '#E6FFFA', fg: '#066B63', bd: '#97FBE7' },
    info:    { bg: '#EFF8FF', fg: '#175CD3', bd: '#B2DDFF' },
    warning: { bg: '#FFF8E1', fg: '#A77100', bd: '#FFE78F' },
    neutral: { bg: '#F5F5F5', fg: '#475569', bd: '#E2E8F0' },
  }[meta.tone];
  const pad = size === 'md' ? '4px 12px' : '2px 9px';
  const fs = size === 'md' ? 13 : 12;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      font: `500 ${fs}px/${fs + 4}px Inter`,
      padding: pad,
      borderRadius: 9999,
      background: palette.bg, color: palette.fg,
      border: `1px solid ${palette.bd}`,
      whiteSpace: 'nowrap',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 9999, background: meta.dot }} />
      {meta.label}
    </span>
  );
}

// ─── Pending status (with optional days-remaining bar) ────────────────
function PendingProgress({ deliveredISO }) {
  const delivered = new Date(deliveredISO);
  const today = new Date('2026-05-21');
  const days = Math.max(0, Math.floor((today - delivered) / (1000 * 60 * 60 * 24)));
  const remaining = Math.max(0, 30 - days);
  const pct = Math.min(100, (days / 30) * 100);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 110 }}>
      <div style={{ font: '500 12px/16px Inter', color: '#A77100' }}>
        {remaining}d return window
      </div>
      <div style={{ height: 4, background: '#FFF1BF', borderRadius: 9999, overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: '#FDC12D' }} />
      </div>
    </div>
  );
}

// ─── Copy-to-clipboard ────────────────────────────────────────────────
function CopyCode({ code, size = 'md', variant = 'light' }) {
  const [copied, setCopied] = React.useState(false);
  const copy = () => {
    try { navigator.clipboard.writeText(code); } catch (e) {}
    setCopied(true);
    setTimeout(() => setCopied(false), 1600);
  };
  const dark = variant === 'dark';
  return (
    <button
      onClick={copy}
      style={{
        display: 'inline-flex', alignItems: 'center', gap: 10,
        padding: size === 'lg' ? '12px 16px' : '10px 14px',
        background: dark ? 'rgba(255,255,255,0.10)' : '#fff',
        border: `1px dashed ${dark ? 'rgba(255,255,255,0.35)' : '#D0D5DD'}`,
        borderRadius: 10,
        font: `600 ${size === 'lg' ? 16 : 14}px/${size === 'lg' ? 22 : 20}px "JetBrains Mono", ui-monospace, monospace`,
        color: dark ? '#fff' : '#141B34',
        letterSpacing: '0.04em',
        cursor: 'pointer',
        transition: 'background 160ms',
      }}
      title="Click to copy"
    >
      <span>{code}</span>
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 4,
        color: copied ? '#0ABE52' : (dark ? 'rgba(255,255,255,0.6)' : '#667085'),
        font: '500 12px/16px Inter',
        letterSpacing: '0',
      }}>
        <I name={copied ? 'tick01' : 'edit'} size={14} />
        {copied ? 'Copied' : 'Copy'}
      </span>
    </button>
  );
}

// ─── Empty State ──────────────────────────────────────────────────────
function EmptyState({ icon = 'userMultiple', title, body, action }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      padding: '48px 24px', textAlign: 'center',
      background: '#fff',
      border: '1px dashed #D0D5DD',
      borderRadius: 12,
      gap: 12,
    }}>
      <div style={{
        width: 56, height: 56, borderRadius: 9999,
        background: '#E6FFFA', color: '#00AE99',
        display: 'grid', placeItems: 'center',
      }}>
        <I name={icon} size={28} />
      </div>
      <div style={{ font: '600 17px/24px Inter', color: '#141B34', maxWidth: 380 }}>{title}</div>
      <div style={{ font: '400 14px/20px Inter', color: '#667085', maxWidth: 420 }}>{body}</div>
      {action}
    </div>
  );
}

// ─── format helpers ───────────────────────────────────────────────────
function fmtDate(iso, opts = {}) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-NG', { year: opts.long ? 'numeric' : '2-digit', month: 'short', day: 'numeric' });
}

Object.assign(window, {
  QRSvg, StatusPill, CopyCode, EmptyState, PendingProgress,
  STATUS_META, fmtDate,
});

</script>

<script type="text/babel">
// TopBar.jsx — Personal Centre top bar.

function PCTopBar({ crumbs = [{ label: 'Personal Centre' }, { label: 'Promoter' }], onNavigate, pharmacy }) {
  return (
    <header style={{
      display: 'flex', alignItems: 'center', gap: 16,
      padding: '14px 28px',
      borderBottom: '1px solid #EAECF0',
      background: '#fff',
      position: 'sticky', top: 0, zIndex: 5,
    }}>
      <nav style={{ display: 'flex', alignItems: 'center', gap: 6, font: '500 13px/18px Inter', color: '#667085' }}>
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <I name="arrowDown01" size={14} color="#9F9F9F" style={{ transform: 'rotate(-90deg)' }} />}
            <span
              onClick={() => c.id && onNavigate && onNavigate(c.id)}
              style={{
                color: i === crumbs.length - 1 ? '#141B34' : '#667085',
                font: i === crumbs.length - 1 ? '600 13px/18px Inter' : '500 13px/18px Inter',
                cursor: c.id ? 'pointer' : 'default',
              }}
            >
              {c.label}
            </span>
          </React.Fragment>
        ))}
      </nav>

      <div style={{ flex: 1 }} />

      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '8px 14px',
        border: '1px solid #E2E8F0', borderRadius: 9999,
        font: '400 13px/18px Inter', color: '#9F9F9F',
        width: 240,
      }}>
        <I name="search01" size={16} color="#9F9F9F" />
        <span>Search invitees, orders…</span>
      </div>

      <button title="Help" style={iconBtn()}><I name="helpCircle" size={20} color="#475569" /></button>
      <button title="Notifications" style={{ ...iconBtn(), position: 'relative' }}>
        <I name="notification01" size={20} color="#475569" />
        <span style={{
          position: 'absolute', top: 6, right: 6,
          width: 8, height: 8, borderRadius: 9999, background: '#E92222',
          border: '2px solid #fff',
        }} />
      </button>

      <div style={{ width: 1, height: 24, background: '#EAECF0', margin: '0 4px' }} />

      <div style={{
        width: 36, height: 36, borderRadius: 9999,
        background: 'linear-gradient(135deg,#00AE99,#066B63)',
        color: '#fff', font: '700 13px/36px Inter', textAlign: 'center',
      }}>{pharmacy?.initials || 'CV'}</div>
    </header>
  );
}

function iconBtn() {
  return {
    width: 36, height: 36, display: 'inline-grid', placeItems: 'center',
    background: 'transparent', border: 'none',
    borderRadius: 9999, cursor: 'pointer',
    transition: 'background 160ms',
  };
}

window.PCTopBar = PCTopBar;

</script>

<script type="text/babel">
// Tables.jsx — invitee, commission, withdrawal data tables for the Promoter Page.
// Each table is paginated and accepts a filter prop set by the host.

function TableShell({ title, subtitle, actions, children, footer }) {
  return (
    <section style={{
      background: '#fff',
      border: '1px solid #EAECF0',
      borderRadius: 12,
      overflow: 'hidden',
      boxShadow: '0 1px 2px 0 rgba(16,24,40,0.05)',
    }}>
      {(title || actions) && (
        <header style={{
          display: 'flex', alignItems: 'center', gap: 16,
          padding: '18px 20px 14px',
          borderBottom: '1px solid #EAECF0',
        }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            {title && <div style={{ font: '600 16px/22px Inter', color: '#141B34' }}>{title}</div>}
            {subtitle && <div style={{ font: '400 13px/18px Inter', color: '#667085', marginTop: 2 }}>{subtitle}</div>}
          </div>
          {actions && <div style={{ display: 'flex', gap: 8, flex: 'none' }}>{actions}</div>}
        </header>
      )}
      {children}
      {footer}
    </section>
  );
}

// ─── Invitee Network table ─────────────────────────────────────────────
function InviteeTable({ invitees, filter, onChangeFilter, onShareCTA, density = 'regular' }) {
  const rows = invitees.filter(p => {
    if (filter === 'verified') return p.status === 'verified';
    if (filter === 'pending')  return p.status === 'pending';
    return true;
  });
  const verified = invitees.filter(p => p.status === 'verified').length;
  const pending  = invitees.filter(p => p.status === 'pending').length;
  const cellY = density === 'compact' ? 10 : 14;

  const FilterChip = ({ id, label, count }) => {
    const active = filter === id;
    return (
      <button
        onClick={() => onChangeFilter && onChangeFilter(id)}
        style={{
          display: 'inline-flex', alignItems: 'center', gap: 6,

// ─── Commission Detail table ───────────────────────────────────────────
function CommissionTable({
  commissions, invitees,
  filterStatus, onChangeStatus,
  filterInvitee, onChangeInvitee,
  filterMonth, onChangeMonth, onOpenMonth,
  onShowFilters, showFilters, onResetFilters,
  density = 'regular',
}) {
  const inviteeName = (id) => (invitees.find(p => p.id === id)?.name) || '—';
  const months = Array.from(new Set(commissions.map(c => c.delivered.slice(0, 7))));
  const cellY = density === 'compact' ? 10 : 14;

  const rows = commissions.filter(c => {
    if (filterStatus !== 'all' && c.status !== filterStatus) return false;
    if (filterInvitee !== 'all' && c.inviteeId !== filterInvitee) return false;
    if (filterMonth !== 'all' && c.delivered.slice(0, 7) !== filterMonth) return false;
    return true;
  });

  const total = rows.reduce((s, c) => s + c.amount, 0);

  return (
    <TableShell
      title="Commission Detail"
      subtitle="Line-item breakdown by Invitee and order"
      actions={
        <React.Fragment>
          <button onClick={onShowFilters} style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '8px 14px', borderRadius: 9999,
            border: `1px solid ${showFilters ? '#00AE99' : '#D0D5DD'}`,
            background: showFilters ? '#E6FFFA' : '#fff',
            color: showFilters ? '#066B63' : '#475569',
            font: '500 13px/18px Inter', cursor: 'pointer',
          }}>
            <I name="filterHorizontal" size={16} />
            Filters
            {(filterStatus !== 'all' || filterInvitee !== 'all' || filterMonth !== 'all') && (
              <span style={{
                font: '600 11px/14px Inter',
                background: '#00AE99', color: '#fff',
                padding: '1px 7px', borderRadius: 9999,
              }}>
                {[filterStatus !== 'all', filterInvitee !== 'all', filterMonth !== 'all'].filter(Boolean).length}
              </span>
            )}
          </button>
          <button onClick={onOpenMonth} style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '8px 14px', borderRadius: 9999,
            border: '1px solid #D0D5DD', background: '#fff', color: '#475569',
            font: '500 13px/18px Inter', cursor: 'pointer',
          }}>
            <I name="calendar" size={16} />
            {filterMonth === 'all' ? 'All months' : new Date(filterMonth + '-01').toLocaleDateString('en-NG', { month: 'long', year: 'numeric' })}
            <I name="arrowDown01" size={14} />
          </button>
        </React.Fragment>
      }
    >
      {showFilters && (
        <div style={{
          padding: '16px 20px',
          borderBottom: '1px solid #EAECF0',
          background: '#FAFBFC',
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr) auto', gap: 12, alignItems: 'end',
        }}>
          <FilterField label="Status">
            <SelectInput
              value={filterStatus}
              onChange={onChangeStatus}
              options={[
                { value: 'all', label: 'All statuses' },
                { value: 'pending', label: 'Pending Payment' },
                { value: 'withdrawable', label: 'Withdrawable' },
                { value: 'withdrawn', label: 'Payment Withdrawn' },
              ]}
            />
          </FilterField>
          <FilterField label="Invitee">
            <SelectInput
              value={filterInvitee}
              onChange={onChangeInvitee}
              options={[
                { value: 'all', label: 'All invitees' },
                ...invitees.map(p => ({ value: p.id, label: p.name })),
              ]}
            />
          </FilterField>
          <FilterField label="Billing month">
            <SelectInput
              value={filterMonth}
              onChange={onChangeMonth}
              options={[
                { value: 'all', label: 'All months' },
                ...months.map(m => ({ value: m, label: new Date(m + '-01').toLocaleDateString('en-NG', { month: 'long', year: 'numeric' }) })),
              ]}
            />
          </FilterField>
          <button onClick={onResetFilters} style={{
            padding: '10px 14px', borderRadius: 9999,
            border: '1px solid #D0D5DD', background: '#fff', color: '#475569',
            font: '500 13px/18px Inter', cursor: 'pointer',
          }}>Reset</button>
        </div>
      )}
      <div style={{ overflow: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', font: '400 13px/18px Inter' }}>
          <thead>
            <tr style={{ background: '#FAFBFC', textAlign: 'left' }}>
              <th style={th()}>Invitee pharmacy</th>
              <th style={th()}>Order reference</th>
              <th style={th()}>Delivery confirmed</th>
              <th style={th()}>Status</th>
              <th style={th('right')}>Commission</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(c => (
              <tr key={c.id} style={{ borderTop: '1px solid #EAECF0' }}>
                <td style={td(cellY, '#141B34')}>{inviteeName(c.inviteeId)}</td>
                <td style={td(cellY, '#475569')}>
                  <span style={{ font: '500 12px/16px "JetBrains Mono", ui-monospace, monospace', color: '#475569' }}>{c.order}</span>
                </td>
                <td style={td(cellY, '#475569')}>{fmtDate(c.delivered)}</td>
                <td style={td(cellY)}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <StatusPill status={c.status} />
                    {c.status === 'pending' && <PendingProgress deliveredISO={c.delivered} />}
                  </div>
                </td>
                <td style={{ ...td(cellY, '#141B34'), textAlign: 'right', font: '600 14px/20px Inter' }}>{NGN(c.amount)}</td>
              </tr>
            ))}
            {rows.length === 0 && (
              <tr><td colSpan={5} style={{ padding: 32, textAlign: 'center', color: '#9F9F9F' }}>No commission entries match these filters.</td></tr>
            )}
          </tbody>
          {rows.length > 0 && (
            <tfoot>
              <tr style={{ background: '#FAFBFC', borderTop: '1px solid #EAECF0' }}>
                <td style={{ ...td(12, '#667085'), font: '500 13px/18px Inter' }} colSpan={4}>{rows.length} entries</td>
                <td style={{ ...td(12, '#141B34'), textAlign: 'right', font: '700 14px/20px Inter' }}>{NGN(total)}</td>
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </TableShell>
  );
}

// ─── Withdrawal history ────────────────────────────────────────────────

// ─── input primitives used by filters ──────────────────────────────────
function FilterField({ label, children }) {
  return (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 6, minWidth: 0 }}>
      <span style={{ font: '500 12px/16px Inter', color: '#667085' }}>{label}</span>

}
function SelectInput({ value, onChange, options }) {
  return (
    <div style={{ position: 'relative' }}>
      <select
        value={value}
        onChange={(e) => onChange && onChange(e.target.value)}
        style={{
          appearance: 'none', WebkitAppearance: 'none',
          width: '100%',
          padding: '9px 32px 9px 12px',
          border: '1px solid #D0D5DD', borderRadius: 8,
          background: '#fff',
          font: '400 14px/20px Inter', color: '#141B34',
          cursor: 'pointer',
        }}
      >
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}

      <I name="arrowDown01" size={16} color="#667085" style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }} />
    </div>
  );
}

// ─── shared cell styles ────────────────────────────────────────────────
function th(align = 'left') {
  return {
    padding: '12px 20px',
    font: '600 12px/16px Inter',
    color: '#667085',
    letterSpacing: '0.02em',
    textTransform: 'uppercase',
    textAlign: align,

}
function td(y = 14, color = '#475569') {
  return {
    padding: y + 'px 20px',
    color,
    font: '400 14px/20px Inter',
    verticalAlign: 'middle',

}
function paginationRow() {
  return {
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '12px 20px',
    borderTop: '1px solid #EAECF0',
    background: '#FAFBFC',

}
function pgBtn(active) {
  return {
    display: 'inline-flex', alignItems: 'center', gap: 4,
    padding: '6px 12px', borderRadius: 8,
    border: '1px solid ' + (active ? '#00AE99' : '#D0D5DD'),
    background: active ? '#E6FFFA' : '#fff',
    color: active ? '#066B63' : '#475569',
    font: '500 12px/18px Inter',
    cursor: 'pointer',
  };
}

Object.assign(window, {
  TableShell, InviteeTable, CommissionTable, WithdrawalHistory,
  FilterField, SelectInput,
});

</script>

// ─── Bank Account form ─────────────────────────────────────────────────
function BankAccountModal({ open, onClose, bank, onSave }) {
  const [form, setForm] = React.useState({ name: bank?.name || '', number: bank?.number || '', bank: bank?.bank || '' });
  const [errors, setErrors] = React.useState({});
  React.useEffect(() => { if (open) { setForm({ name: bank?.name || '', number: bank?.number || '', bank: bank?.bank || '' }); setErrors({}); } }, [open]);
  if (!open) return null;

  const banks = ['Access Bank', 'Ecobank Nigeria', 'Fidelity Bank', 'First Bank of Nigeria', 'First City Monument Bank', 'Guaranty Trust Bank', 'Stanbic IBTC Bank', 'Sterling Bank', 'United Bank for Africa', 'Union Bank of Nigeria', 'Wema Bank', 'Zenith Bank'];

  const submit = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Account name is required';
    if (!/^\d{10}$/.test(form.number)) e.number = 'Account number must be 10 digits';
    if (!form.bank) e.bank = 'Select a bank';
    setErrors(e);

// ─── Month Picker (grid) ───────────────────────────────────────────────
function MonthPickerModal({ open, onClose, value, onChange }) {
  const [year, setYear] = React.useState(value && value !== 'all' ? Number(value.slice(0, 4)) : 2026);
  if (!open) return null;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthCode = (m) => `${year}-${String(m + 1).padStart(2, '0')}`;
  const today = new Date('2026-05-21');
  const todayCode = today.toISOString().slice(0, 7);
  return (
    <Scrim onClose={onClose}>
      <div style={card(420)}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid #EAECF0', display: 'flex', alignItems: 'center', gap: 12 }}>
          <button onClick={() => setYear(y => y - 1)} style={iconBtnSm()}><I name="arrowLeft01" size={18} color="#667085" /></button>
          <div style={{ flex: 1, textAlign: 'center', font: '600 16px/22px Inter', color: '#141B34' }}>{year}</div>
          <button onClick={() => setYear(y => y + 1)} style={iconBtnSm()}><I name="arrowRight01" size={18} color="#667085" /></button>
          <div style={{ width: 1, height: 24, background: '#EAECF0', margin: '0 6px' }} />
          <button onClick={onClose} style={iconBtnSm()}><I name="cancel01" size={18} color="#667085" /></button>
        </div>
        <div style={{ padding: 16, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
          <button
            onClick={() => { onChange && onChange('all'); onClose(); }}
            style={{
              padding: '10px 8px', borderRadius: 8,
              border: '1px solid ' + (value === 'all' ? '#00AE99' : '#EAECF0'),
              background: value === 'all' ? '#E6FFFA' : '#fff',
              color: value === 'all' ? '#066B63' : '#475569',
              font: '500 13px/18px Inter', cursor: 'pointer',
              gridColumn: 'span 3',
            }}
          >All time</button>
          {months.map((m, i) => {
            const code = monthCode(i);
            const isSelected = code === value;
            const isCurrent = code === todayCode;
            const inFuture = new Date(code + '-01') > today;
            return (
              <button
                key={m}
                disabled={inFuture}
                onClick={() => { onChange && onChange(code); onClose(); }}
                style={{
                  padding: '14px 8px', borderRadius: 8,
                  border: '1px solid ' + (isSelected ? '#00AE99' : '#EAECF0'),
                  background: isSelected ? '#E6FFFA' : (inFuture ? '#FAFBFC' : '#fff'),
                  color: inFuture ? '#C9CDD2' : (isSelected ? '#066B63' : '#141B34'),
                  font: (isSelected || isCurrent ? '600 ' : '500 ') + '14px/20px Inter',
                  cursor: inFuture ? 'not-allowed' : 'pointer',
                  position: 'relative',
                }}
              >
                {m}
                {isCurrent && !isSelected && (
                  <span style={{
                    position: 'absolute', top: 6, right: 8,
                    width: 6, height: 6, borderRadius: 9999, background: '#00AE99',
                  }} />
                )}
              </button>
            );
          })}
        </div>
      </div>
    </Scrim>
  );
}
