// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

function MonthlyBars({ months }) {
  const max = Math.max(...months.map(m => m.total), 1);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {months.map(m => (
        <div key={m.month}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ font: '500 13px/18px Inter', color: '#141B34' }}>{m.label}</span>
            <span style={{ font: '600 14px/20px Inter', color: '#141B34' }}>{NGN(m.total)}</span>
          </div>
          <div style={{ display: 'flex', height: 12, borderRadius: 9999, overflow: 'hidden', background: '#F5F5F5' }}>
            {m.withdrawable > 0 && <div style={{ width: `${(m.withdrawable / max) * 100}%`, background: '#0ABE52' }} />}
            {m.confirmed > 0    && <div style={{ width: `${(m.confirmed    / max) * 100}%`, background: '#2E90FA' }} />}
            {m.pending > 0      && <div style={{ width: `${(m.pending      / max) * 100}%`, background: '#FDC12D' }} />}
          </div>
          <div style={{ display: 'flex', gap: 14, marginTop: 6, font: '400 12px/16px Inter', color: '#667085' }}>
            {m.withdrawable > 0 && <span><Dot c="#0ABE52" />Withdrawable {NGN(m.withdrawable)}</span>}
            {m.confirmed > 0    && <span><Dot c="#2E90FA" />Confirmed {NGN(m.confirmed)}</span>}
            {m.pending > 0      && <span><Dot c="#FDC12D" />Pending {NGN(m.pending)}</span>}
          </div>
        </div>
      ))}
    </div>
  );
}
function Dot({ c }) { return <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: 9999, background: c, marginRight: 6, verticalAlign: 'middle' }} />; }

<script type="text/babel">
// VariantBScroll.jsx — Promoter Page · "Single scrolling page with sticky sub-nav" layout.
// All five sections live on the same scroll surface. A right-rail anchor list highlights the active section.

function VariantBScroll({ persona }) {
  const c = usePromoterController(persona);
  const t = totals(persona);
  const scrollRef = React.useRef(null);
  const [active, setActive] = React.useState('identity');

  const SECTIONS = [
    { id: 'identity', label: 'Promoter Identity', icon: 'userMultiple' },
    { id: 'network',  label: 'Invitee Network',   icon: 'building01' },
    { id: 'earnings', label: 'Commission',        icon: 'trendingUp' },
    { id: 'detail',   label: 'Detail List',       icon: 'receipt' },
    { id: 'bank',     label: 'Bank & Withdrawal', icon: 'download' },
  ];

  const scrollTo = (id) => {
    const root = scrollRef.current;
    if (!root) return;
    const el = root.querySelector(`[data-section="${id}"]`);
    if (el) {
      root.scrollTo({ top: el.offsetTop - 12, behavior: 'smooth' });
      setActive(id);
    }
  };

  // Update active section on scroll
  const onScroll = () => {
    const root = scrollRef.current;
    if (!root) return;
    const top = root.scrollTop;
    let cur = SECTIONS[0].id;
    for (const s of SECTIONS) {
      const el = root.querySelector(`[data-section="${s.id}"]`);
      if (el && el.offsetTop - 80 <= top) cur = s.id;
    }
    setActive(cur);
  };

  return (
    <div style={{ display: 'flex', minHeight: '100%', background: '#F5F5F5', font: '400 14px/20px Inter' }}>
      <PCSidebar active="promoter" pharmacy={persona.pharmacy} />

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <PCTopBar pharmacy={persona.pharmacy} />

        <div ref={scrollRef} onScroll={onScroll} style={{
          flex: 1, overflow: 'auto',
          display: 'grid', gridTemplateColumns: '1fr 232px', gap: 32,
          padding: '24px 32px 60px',
          alignItems: 'flex-start',
        }}>
          <main style={{ display: 'flex', flexDirection: 'column', gap: 32 }}>
            {/* Identity */}
            <SectionWrap id="identity" eyebrow="Section 1" title="Promoter Identity" subtitle="Your invitation code and shareable QR.">
              <IdentityWideHero persona={persona} c={c} t={t} />
            </SectionWrap>

            {/* Network */}
            <SectionWrap id="network" eyebrow="Section 2" title="Invitee Network" subtitle={`${persona.invitees.length} pharmacies directly invited by you.`}>
              <InviteeTable
                invitees={persona.invitees}
                filter={c.inviteeFilter}
                onChangeFilter={c.setInviteeFilter}
                onShareCTA={() => c.setShareOpen(true)}
              />
            </SectionWrap>

            {/* Earnings */}
            <SectionWrap id="earnings" eyebrow="Section 3" title="Commission Summary" subtitle="Pending · Confirmed · Withdrawable — at a glance.">
              <EarningsBlock persona={persona} c={c} t={t} />
            </SectionWrap>

            {/* Detail */}
            <SectionWrap id="detail" eyebrow="Section 4" title="Commission Detail" subtitle="Line-item breakdown per Invitee per order.">
              <CommissionTable
                commissions={persona.commissions}
                invitees={persona.invitees}
                filterStatus={c.filterStatus} onChangeStatus={c.setFilterStatus}
                filterInvitee={c.filterInvitee} onChangeInvitee={c.setFilterInvitee}
                filterMonth={c.filterMonth} onChangeMonth={c.setFilterMonth}
                onOpenMonth={() => c.setMonthOpen(true)}
                onShowFilters={() => c.setShowFilters(!c.showFilters)}
                showFilters={c.showFilters}
                onResetFilters={() => { c.setFilterStatus('all'); c.setFilterInvitee('all'); c.setFilterMonth('all'); }}
              />
            </SectionWrap>

            {/* Bank */}
            <SectionWrap id="bank" eyebrow="Section 5" title="Bank Account & Withdrawal" subtitle="Where your withdrawn commission is paid.">
              <BankBlock persona={persona} c={c} t={t} />
            </SectionWrap>
          </main>

          {/* Sticky sub-nav (right rail) */}
          <aside style={{ position: 'sticky', top: 0, alignSelf: 'flex-start' }}>
            <div style={{
              background: '#fff', border: '1px solid #EAECF0', borderRadius: 12,
              padding: 14, boxShadow: '0 1px 2px 0 rgba(16,24,40,0.05)',
            }}>
              <div style={{ font: '600 11px/14px Inter', color: '#9F9F9F', letterSpacing: '0.06em', textTransform: 'uppercase', padding: '4px 8px 10px' }}>
                On this page
              </div>
              <nav style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                {SECTIONS.map((s, i) => {
                  const isActive = active === s.id;
                  return (
                    <button
                      key={s.id}
                      onClick={() => scrollTo(s.id)}
                      style={{
                        display: 'flex', alignItems: 'center', gap: 10,
                        padding: '8px 10px', borderRadius: 8,
                        border: 'none',
                        background: isActive ? '#E6FFFA' : 'transparent',
                        font: isActive ? '600 13px/18px Inter' : '500 13px/18px Inter',
                        color: isActive ? '#066B63' : '#475569',
                        cursor: 'pointer', textAlign: 'left',
                      }}

              <MobileView persona={persona} />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="notes"
          title="How to explore the prototype"
          subtitle="Each artboard above is fully clickable — change persona in the Tweaks panel, tap a QR to zoom it, open the share sheet, file a withdrawal, fill the bank form, jump to a month, or simulate an API error from the chip in each desktop artboard's bottom-right."
        >
          <DCArtboard id="legend" label="States & interactions reference" width={1320} height={420}>
            <LegendCard />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="User persona" />
        <TweakRadio
          label="Pharmacy state"
          value={t.persona}
          options={[
            { value: 'active', label: 'Active inviter' },
            { value: 'mid',    label: 'Mid-journey' },
            { value: 'empty',  label: 'Brand new' },
          ]}
          onChange={(v) => setTweak('persona', v)}
        />
        <div style={{ font: '400 11px/15px Inter', color: '#666', padding: '4px 4px 8px', opacity: 0.8 }}>
          <b>Active:</b> 9 invitees, full commission history, bank on file.<br />
          <b>Mid-journey:</b> 2 invitees, small balance, no bank yet.<br />
          <b>Brand new:</b> empty state · prompts to share QR + add bank.
        </div>
      </TweaksPanel>
    </React.Fragment>
  );
}

window.App = App;
